services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gainful
      POSTGRES_USER: yoke
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8081:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/gainful
      DB_USER: yoke
      JWT_SECRET: test-secret-for-dev
    depends_on:
      - postgres

volumes:
  pgdata:
