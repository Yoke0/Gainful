junit = "4.13.2"
kotlin = "2.4.0"
kotlinx-coroutines = "1.11.0"
kotlinx-coroutines-test = "1.11.0"
kotlinx-datetime = "0.8.0"
material3 = "1.12.0-alpha02"
ktor = "3.5.1"
