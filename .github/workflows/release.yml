name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Write local.properties
        env:
          SERVER_BASE_URL: ${{ secrets.SERVER_BASE_URL }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          # Server URL (required for working APK)
          if [ -n "$SERVER_BASE_URL" ]; then
            echo "SERVER_BASE_URL=$SERVER_BASE_URL" >> local.properties
          fi
          # Signing config (optional, skips signing if not set)
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
            cat >> local.properties <<EOF
            RELEASE_STORE_FILE=/tmp/release.jks
            RELEASE_STORE_PASSWORD=$RELEASE_STORE_PASSWORD
            RELEASE_KEY_ALIAS=$RELEASE_KEY_ALIAS
            RELEASE_KEY_PASSWORD=$RELEASE_KEY_PASSWORD
            EOF
          fi

      - name: Build release APK
        run: ./gradlew :androidApp:assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2)
          APK_DIR=androidApp/build/outputs/apk/release
          mv "$APK_DIR"/androidApp-release.apk "$APK_DIR/Gainful-v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gainful-release
          path: androidApp/build/outputs/apk/release/*.apk
